name: Run Python Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Wireshark (editcap and tshark)
        run: sudo apt-get update && sudo apt-get install -y wireshark-common

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[docs] pytest

      - name: Run tests with pytest
        run: pytest --maxfail=2 --disable-warnings -v
